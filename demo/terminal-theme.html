<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iker Lissarrague - Terminal Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #1a1b26;
  --bg-darker: #13141c;
  --fg: #c0caf5;
  --fg-dim: #565f89;
  --accent: #7dcfff;
  --green: #9ece6a;
  --red: #f7768e;
  --yellow: #e0af68;
  --purple: #bb9af7;
  --orange: #ff9e64;
  --chrome-bg: #24283b;
  --chrome-border: #3b4261;
  --selection: rgba(125, 207, 255, 0.15);
  --link: #7dcfff;
}

.light-theme {
  --bg: #f0f0f0;
  --bg-darker: #e0e0e0;
  --fg: #1a1b26;
  --fg-dim: #888;
  --accent: #0070c0;
  --green: #2e7d32;
  --red: #c62828;
  --yellow: #f57f17;
  --purple: #6a1b9a;
  --orange: #e65100;
  --chrome-bg: #d6d6d6;
  --chrome-border: #bbb;
  --selection: rgba(0, 112, 192, 0.15);
  --link: #0070c0;
}

body {
  font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace;
  background: var(--bg-darker);
  color: var(--fg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  transition: background 0.3s, color 0.3s;
}

.terminal-window {
  width: 100%;
  max-width: 900px;
  background: var(--bg);
  border-radius: 10px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  overflow: hidden;
  transition: background 0.3s, box-shadow 0.3s;
}

/* Title bar */
.title-bar {
  background: var(--chrome-bg);
  border-bottom: 1px solid var(--chrome-border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  user-select: none;
  transition: background 0.3s, border-color 0.3s;
}

.window-controls {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.window-controls span {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: block;
}

.dot-close { background: #ff5f57; }
.dot-minimize { background: #febc2e; }
.dot-maximize { background: #28c840; }

.title-text {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: var(--fg-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.title-toggles {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.toggle-btn {
  background: none;
  border: 1px solid var(--chrome-border);
  color: var(--fg-dim);
  font-family: inherit;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.toggle-btn:hover {
  color: var(--fg);
  border-color: var(--fg-dim);
}

.toggle-btn.active {
  color: var(--accent);
  border-color: var(--accent);
}

/* Navigation bar */
.nav-bar {
  background: var(--chrome-bg);
  border-bottom: 1px solid var(--chrome-border);
  padding: 6px 16px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  transition: background 0.3s, border-color 0.3s;
}

.nav-item {
  background: none;
  border: none;
  color: var(--fg-dim);
  font-family: inherit;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.2s, background 0.2s;
}

.nav-item:hover {
  color: var(--fg);
  background: var(--selection);
}

.nav-item.active {
  color: var(--accent);
  background: var(--selection);
}

/* Terminal body */
.terminal-body {
  padding: 20px;
  min-height: 400px;
  max-height: 70vh;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.6;
  scroll-behavior: smooth;
}

.terminal-body::-webkit-scrollbar {
  width: 8px;
}

.terminal-body::-webkit-scrollbar-track {
  background: var(--bg);
}

.terminal-body::-webkit-scrollbar-thumb {
  background: var(--chrome-border);
  border-radius: 4px;
}

/* Terminal lines */
.prompt {
  color: var(--green);
  white-space: nowrap;
}

.prompt-host {
  color: var(--accent);
}

.prompt-separator {
  color: var(--fg-dim);
}

.prompt-path {
  color: var(--purple);
}

.prompt-dollar {
  color: var(--fg);
}

.command-line {
  display: flex;
  flex-wrap: nowrap;
  gap: 0;
  margin-bottom: 2px;
}

.command-text {
  color: var(--fg);
  white-space: pre;
}

.output-block {
  margin-bottom: 16px;
  white-space: pre-wrap;
  word-break: break-word;
}

.cursor {
  display: inline-block;
  width: 8px;
  height: 16px;
  background: var(--fg);
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 1px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Clickable commands in output */
.clickable-cmd {
  color: var(--link);
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 3px;
  cursor: pointer;
  transition: color 0.2s;
}

.clickable-cmd:hover {
  color: var(--yellow);
}

/* ASCII art */
.ascii-art {
  color: var(--accent);
  font-size: 12px;
  line-height: 1.2;
  margin-bottom: 8px;
}

/* Table formatting */
.table-row {
  display: flex;
  gap: 0;
}

.table-cell {
  white-space: pre;
}

/* Color helpers */
.c-green { color: var(--green); }
.c-accent { color: var(--accent); }
.c-red { color: var(--red); }
.c-yellow { color: var(--yellow); }
.c-purple { color: var(--purple); }
.c-orange { color: var(--orange); }
.c-dim { color: var(--fg-dim); }
.c-fg { color: var(--fg); }
.c-bold { font-weight: 700; }

/* CRT effect overlay */
.crt-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1000;
}

.crt-overlay.active {
  display: block;
}

.crt-overlay.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
  pointer-events: none;
}

.crt-overlay.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.25) 100%);
  pointer-events: none;
}

/* Below-terminal note */
.below-note {
  max-width: 900px;
  width: 100%;
  text-align: center;
  margin-top: 16px;
  font-size: 12px;
  color: var(--fg-dim);
  transition: color 0.3s;
}

/* Responsive */
@media (max-width: 640px) {
  body {
    padding: 8px;
  }

  .terminal-body {
    padding: 12px;
    font-size: 12px;
    max-height: 65vh;
  }

  .ascii-art {
    font-size: 8px;
  }

  .title-text {
    font-size: 11px;
  }

  .nav-item {
    font-size: 12px;
    padding: 5px 8px;
  }

  .toggle-btn {
    font-size: 10px;
    padding: 2px 6px;
  }
}

/* Skip animation helper */
.skip-hint {
  color: var(--fg-dim);
  font-size: 11px;
  margin-top: 4px;
  opacity: 0;
  transition: opacity 0.3s;
}

.skip-hint.visible {
  opacity: 1;
}
</style>
</head>
<body>

<div class="crt-overlay" id="crtOverlay"></div>

<div class="terminal-window">
  <div class="title-bar">
    <div class="window-controls">
      <span class="dot-close"></span>
      <span class="dot-minimize"></span>
      <span class="dot-maximize"></span>
    </div>
    <div class="title-text">iker@lissarrague.xyz: ~</div>
    <div class="title-toggles">
      <button class="toggle-btn" id="crtToggle" onclick="toggleCRT()">CRT</button>
      <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">Light</button>
    </div>
  </div>
  <nav class="nav-bar" id="navBar">
    <button class="nav-item active" data-section="home" onclick="navigate('home')">~/about</button>
    <button class="nav-item" data-section="projects" onclick="navigate('projects')">~/projects</button>
    <button class="nav-item" data-section="reading" onclick="navigate('reading')">~/reading</button>
    <button class="nav-item" data-section="contact" onclick="navigate('contact')">~/contact</button>
  </nav>
  <div class="terminal-body" id="terminalBody">
  </div>
</div>

<div class="below-note">
  Click the menu items above or the commands below to navigate. This is a regular website!
</div>

<script>
// State
let isAnimating = false;
let skipAnimation = false;
let currentSection = null;
let crtActive = false;
let lightTheme = false;

// Content definitions
const ASCII_BANNER = `<span class="ascii-art"> ___ _  _______ ____
|_ _| |/ / ____|  _ \\
 | || ' /|  _| | |_) |
 | || . \\| |___|  _ <
|___|_|\\_\\_____|_| \\_\\

 _     ___ ____ ____    _    ____  ____    _    ____ _   _ _____
| |   |_ _/ ___/ ___|  / \\  |  _ \\|  _ \\  / \\  / ___| | | | ____|
| |    | |\\___ \\___ \\ / _ \\ | |_) | |_) |/ _ \\| |  _| | | |  _|
| |___ | | ___) |__) / ___ \\|  _ <|  _ </ ___ \\ |_| | |_| | |___
|_____|___|____/____/_/   \\_\\_| \\_\\_| \\_\\_/   \\_\\____|\\___/|_____|</span>`;

const WELCOME_TEXT = `<span class="c-dim">Welcome! Type a command or click a link to explore.</span>`;

const PROMPT_HTML = `<span class="prompt"><span class="prompt-host">iker@lissarrague.xyz</span><span class="prompt-separator">:</span><span class="prompt-path">~</span><span class="prompt-dollar">$</span></span> `;

const sections = {
  home: {
    command: 'cat about.txt',
    output: () => `
<span class="c-bold c-accent">===================================</span>
<span class="c-bold c-accent">  About Me</span>
<span class="c-bold c-accent">===================================</span>

full-stack experience. Interested in new programming
languages.

I write about <span class="c-yellow">Advent of Code</span>, <span class="c-yellow">ray tracers</span>, and other
projects on my blog at <span class="c-accent">lissarrague.xyz</span>.

<span class="c-dim">---</span>
<span class="c-dim">Explore more:</span>
  <span class="clickable-cmd" onclick="navigate('projects')">$ ls -la projects/</span>
  <span class="clickable-cmd" onclick="navigate('reading')">$ cat reading_log.txt</span>
  <span class="clickable-cmd" onclick="navigate('contact')">$ cat contact.txt</span>`
  },

  projects: {
    command: 'ls -la projects/',
    output: () => `
<span class="c-bold c-accent">total 5</span>
<span class="c-dim">drwxr-xr-x  7 iker staff  224 Mar 30 12:00 <span class="c-fg">.</span></span>
<span class="c-dim">drwxr-xr-x  4 iker staff  128 Mar 30 12:00 <span class="c-fg">..</span></span>
<span class="c-dim">drwxr-xr-x  8 iker staff  256 Mar 15 09:32</span> <span class="c-green c-bold">mandelrust/</span>
<span class="c-dim">    Mandelbrot set explorer written in Rust</span>
<span class="c-dim">drwxr-xr-x 12 iker staff  384 Feb 20 14:10</span> <span class="c-green c-bold">go-ray-tracer/</span>
<span class="c-dim">    Ray tracer implementation in Go</span>
<span class="c-dim">drwxr-xr-x 10 iker staff  320 Jan 28 11:45</span> <span class="c-green c-bold">rust-ray-tracer/</span>
<span class="c-dim">    Ray tracer implementation in Rust</span>
<span class="c-dim">drwxr-xr-x  6 iker staff  192 Dec 05 08:22</span> <span class="c-green c-bold">toy-totp/</span>
<span class="c-dim">    Toy TOTP (Time-based One-Time Password) generator</span>
<span class="c-dim">drwxr-xr-x 25 iker staff  800 Dec 25 23:59</span> <span class="c-green c-bold">advent-of-code-2021/</span>
<span class="c-dim">    Solutions for Advent of Code 2021</span>

<span class="c-dim">---</span>
<span class="c-dim">View source at:</span> <span class="c-accent">github.com/Ikerlb/</span>

<span class="c-dim">See also:</span>
  <span class="clickable-cmd" onclick="navigate('home')">$ cat about.txt</span>
  <span class="clickable-cmd" onclick="navigate('contact')">$ cat contact.txt</span>`
  },

  reading: {
    command: 'cat reading_log.txt',
    output: () => `
<span class="c-bold c-accent">===================================</span>
<span class="c-bold c-accent">  Reading Log</span>
<span class="c-bold c-accent">===================================</span>

<span class="c-dim">---</span>
<span class="c-dim">See also:</span>
  <span class="clickable-cmd" onclick="navigate('home')">$ cat about.txt</span>
  <span class="clickable-cmd" onclick="navigate('projects')">$ ls -la projects/</span>`
  },

  contact: {
    command: 'cat contact.txt',
    output: () => `
<span class="c-bold c-accent">===================================</span>
<span class="c-bold c-accent">  Contact</span>
<span class="c-bold c-accent">===================================</span>

<span class="c-green">Email:</span>    <span class="c-accent">iker@lissarrague.xyz</span>
<span class="c-green">GitHub:</span>   <span class="c-accent">github.com/Ikerlb/</span>
<span class="c-green">LinkedIn:</span> <span class="c-accent">linkedin.com/in/iker-lissarrague</span>
<span class="c-green">Web:</span>      <span class="c-accent">lissarrague.xyz</span>

<span class="c-dim">---</span>
<span class="c-dim">See also:</span>
  <span class="clickable-cmd" onclick="navigate('home')">$ cat about.txt</span>
  <span class="clickable-cmd" onclick="navigate('projects')">$ ls -la projects/</span>`
  }
};

// DOM
const body = document.getElementById('terminalBody');
const crtOverlay = document.getElementById('crtOverlay');

// Utilities
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function scrollToBottom() {
  body.scrollTop = body.scrollHeight;
}

function appendHTML(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  body.appendChild(div);
  scrollToBottom();
}

function setNavActive(section) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === section);
  });
}

// Typing animation
async function typeCommand(command) {
  // Create the command line
  const lineEl = document.createElement('div');
  lineEl.className = 'command-line';
  lineEl.innerHTML = PROMPT_HTML;

  const cmdSpan = document.createElement('span');
  cmdSpan.className = 'command-text';
  lineEl.appendChild(cmdSpan);

  const cursorEl = document.createElement('span');
  cursorEl.className = 'cursor';
  lineEl.appendChild(cursorEl);

  body.appendChild(lineEl);
  scrollToBottom();

  // Type each character
  for (let i = 0; i < command.length; i++) {
    if (skipAnimation) {
      cmdSpan.textContent = command;
      break;
    }
    cmdSpan.textContent += command[i];
    scrollToBottom();
    await sleep(35);
  }

  // Remove cursor
  cursorEl.remove();

  // Small pause before output
  if (!skipAnimation) await sleep(150);
}

// Show output with a fast reveal
async function showOutput(html) {
  const outputEl = document.createElement('div');
  outputEl.className = 'output-block';
  outputEl.innerHTML = html;
  body.appendChild(outputEl);
  scrollToBottom();

  // Add a new prompt with blinking cursor
  const promptLine = document.createElement('div');
  promptLine.className = 'command-line';
  promptLine.innerHTML = PROMPT_HTML + '<span class="cursor"></span>';
  body.appendChild(promptLine);
  scrollToBottom();
}

// Navigate to a section
async function navigate(section) {
  if (isAnimating) {
    skipAnimation = true;
    return;
  }
  if (section === currentSection) return;

  isAnimating = true;
  skipAnimation = false;
  currentSection = section;
  setNavActive(section);

  // Remove previous trailing cursor-prompt if any
  const lastLine = body.querySelector('.command-line:last-child');
  if (lastLine && lastLine.querySelector('.cursor') && !lastLine.querySelector('.command-text')?.textContent) {
    lastLine.remove();
  }
  // Also check if last child is a command-line with only prompt+cursor
  const veryLast = body.lastElementChild;
  if (veryLast && veryLast.classList.contains('command-line')) {
    const cmdText = veryLast.querySelector('.command-text');
    if (!cmdText || cmdText.textContent === '') {
      veryLast.remove();
    }
  }

  const sec = sections[section];
  await typeCommand(sec.command);
  await showOutput(sec.output());

  isAnimating = false;
  skipAnimation = false;
}

// Click-to-skip listener
document.addEventListener('click', (e) => {
  // Don't skip if clicking nav or clickable commands
  if (e.target.closest('.nav-item') || e.target.closest('.clickable-cmd') || e.target.closest('.toggle-btn')) return;
  if (isAnimating) {
    skipAnimation = true;
  }
});

// Toggles
function toggleCRT() {
  crtActive = !crtActive;
  crtOverlay.classList.toggle('active', crtActive);
  document.getElementById('crtToggle').classList.toggle('active', crtActive);
}

function toggleTheme() {
  lightTheme = !lightTheme;
  document.body.classList.toggle('light-theme', lightTheme);
  document.getElementById('themeToggle').textContent = lightTheme ? 'Dark' : 'Light';
  document.getElementById('themeToggle').classList.toggle('active', lightTheme);
}

// Initial boot sequence
async function boot() {
  isAnimating = true;
  currentSection = 'home';
  setNavActive('home');

  // ASCII banner
  appendHTML(`<div class="output-block">${ASCII_BANNER}</div>`);
  await sleep(300);

  // Welcome line
  appendHTML(`<div class="output-block">${WELCOME_TEXT}</div>`);
  await sleep(200);

  // Auto-run cat about.txt
  const sec = sections.home;
  await typeCommand(sec.command);
  await showOutput(sec.output());

  isAnimating = false;
}

boot();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lissarrague.xyz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #1d2021;
    --bg-soft: #282828;
    --bg-highlight: #3c3836;
    --fg: #ebdbb2;
    --fg-dim: #a89984;
    --green: #b8bb26;
    --blue: #83a598;
    --yellow: #fabd2f;
    --orange: #fe8019;
    --red: #fb4934;
    --purple: #d3869b;
    --aqua: #8ec07c;
    --link: var(--aqua);
    --link-hover: var(--green);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Title bar ── */
  .title-bar {
    background: var(--bg-highlight);
    display: flex;
    align-items: center;
    padding: 8px 16px;
    gap: 8px;
    border-bottom: 1px solid #504945;
    flex-shrink: 0;
  }
  .title-bar .dots { display: flex; gap: 6px; flex-shrink: 0; }
  .title-bar .dot { width: 12px; height: 12px; border-radius: 50%; }
  .title-bar .dot.red { background: var(--red); }
  .title-bar .dot.yellow { background: var(--yellow); }
  .title-bar .dot.green { background: var(--green); }
  .title-bar .title-text { flex: 1; text-align: center; color: var(--fg-dim); font-size: 13px; }

  /* ── Tab bar ── */
  .tab-bar {
    background: var(--bg);
    display: flex;
    border-bottom: 1px solid #504945;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 20px;
    color: var(--fg-dim);
    font-size: 13px;
    cursor: pointer;
    border-right: 1px solid #504945;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { background: var(--bg-highlight); color: var(--fg); }
  .tab.active {
    background: var(--bg-soft);
    color: var(--fg);
    border-bottom: 2px solid var(--green);
    margin-bottom: -1px;
  }
  .tab .tab-icon { font-size: 11px; }

  /* ── Terminal pane ── */
  .pane-container {
    flex: 1;
    overflow-y: auto;
  }
  .pane {
    display: none;
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    width: 100%;
    animation: fadeIn 0.2s ease-in;
  }
  .pane.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── Prompt ── */
  .prompt-line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-word; }
  .prompt { color: var(--fg-dim); user-select: none; }
  .prompt .user { color: var(--green); font-weight: 700; }
  .prompt .host { color: var(--blue); }
  .prompt .path { color: var(--yellow); }
  .prompt .dollar { color: var(--fg-dim); }
  .command { color: var(--fg); font-weight: 700; }

  /* ── Output ── */
  .output { margin: 4px 0 24px 0; color: var(--fg); }
  .output p { margin: 4px 0; }
  .dim { color: var(--fg-dim); }
  .highlight { color: var(--yellow); }
  .accent { color: var(--aqua); }

  .section-header {
    color: var(--orange); font-weight: 700; margin: 8px 0 4px;
    text-transform: uppercase; font-size: 13px; letter-spacing: 1px;
  }

  a { color: var(--link); text-decoration: none; border-bottom: 1px dashed var(--link); transition: color 0.15s, border-color 0.15s; }
  a:hover { color: var(--link-hover); border-color: var(--link-hover); }

  /* ── cat output ── */
  .cat-output { margin: 4px 0 24px; padding: 0 0 0 2ch; border-left: 2px solid var(--bg-highlight); }
  .cat-output p { margin: 6px 0; }

  /* ── File listing ── */
  .file-listing { font-size: 14px; margin: 8px 0; }
  .file-listing .row {
    display: flex; gap: 0; padding: 4px 2px; cursor: pointer;
    border-radius: 3px; transition: background 0.1s;
  }
  .file-listing .row:hover { background: var(--bg-highlight); }
  .file-listing .perms { color: var(--fg-dim); width: 11ch; flex-shrink: 0; }
  .file-listing .owner { color: var(--green); width: 7ch; flex-shrink: 0; }
  .file-listing .size  { color: var(--fg-dim); width: 7ch; flex-shrink: 0; text-align: right; padding-right: 1ch; }
  .file-listing .date  { color: var(--fg-dim); width: 13ch; flex-shrink: 0; }
  .file-listing .name  { color: var(--blue); font-weight: 700; }
  .file-listing .name.dir::after { content: '/'; color: var(--fg-dim); }

  /* ── Project detail view ── */
  .project-title { color: var(--yellow); font-weight: 700; font-size: 18px; margin: 8px 0; }
  .project-meta { color: var(--fg-dim); font-size: 13px; margin-bottom: 16px; }
  .project-body { margin: 16px 0; }
  .project-body p { margin: 8px 0; }
  .project-links { margin-top: 16px; }
  .project-links a { margin-right: 16px; }
  .tag {
    display: inline-block; background: var(--bg-highlight); color: var(--purple);
    padding: 1px 8px; border-radius: 3px; font-size: 12px; margin-right: 4px;
  }

  /* ── Reading log ── */
  .reading-table { margin: 8px 0; font-size: 14px; }
  .reading-table .entry { display: flex; gap: 0; padding: 2px 0; }
  .reading-table .status { width: 3ch; flex-shrink: 0; }
  .reading-table .status.done { color: var(--green); }
  .reading-table .book-title { color: var(--fg); flex: 1; }
  .reading-table .book-author { color: var(--fg-dim); width: 25ch; flex-shrink: 0; text-align: right; }

  /* ── Interactive input ── */
  .input-line { display: flex; align-items: center; margin-top: 16px; }
  .input-line input {
    background: none; border: none; color: var(--fg); font-family: inherit;
    font-size: inherit; font-weight: 700; outline: none; flex: 1; caret-color: var(--green);
  }
  .cursor-block {
    display: inline-block; width: 8px; height: 1.2em; background: var(--green);
    animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg-highlight); border-radius: 4px; }

  /* ── Skip hint ── */
  .skip-hint {
    position: fixed; bottom: 16px; right: 16px; color: var(--fg-dim); font-size: 12px;
    background: var(--bg-highlight); padding: 4px 10px; border-radius: 4px;
    opacity: 0.7; pointer-events: none; transition: opacity 0.3s;
  }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    body { font-size: 13px; }
    .pane { padding: 16px 12px 40px; }
    .file-listing .perms, .file-listing .owner, .file-listing .size { display: none; }
    .file-listing .date { width: auto; margin-right: 1ch; }
    .reading-table .book-author { width: auto; }
    .tab { padding: 8px 14px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- Title bar -->
<div class="title-bar">
  <div class="dots">
    <span class="dot red"></span>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
  </div>
  <span class="title-text" id="title-text">iker@lissarrague.xyz: ~</span>
  <div class="dots" style="visibility:hidden;">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
</div>

<!-- Tab bar -->
<div class="tab-bar" id="tab-bar">
  <div class="tab active" data-tab="about">
    <span class="tab-icon">~</span> about
  </div>
  <div class="tab" data-tab="projects">
    <span class="tab-icon">~</span> projects
  </div>
  <div class="tab" data-tab="reading">
    <span class="tab-icon">~</span> reading
  </div>
</div>

<!-- Panes -->
<div class="pane-container">

  <!-- ─── About pane ─── -->
  <div class="pane active" id="pane-about"></div>

  <!-- ─── Projects pane ─── -->
  <div class="pane" id="pane-projects"></div>

  <!-- ─── Reading pane ─── -->
  <div class="pane" id="pane-reading"></div>

</div>

<div class="skip-hint" id="skip-hint">click or press any key to skip</div>

<script>
const PROMPT = '<span class="prompt"><span class="user">iker</span>@<span class="host">lissarrague.xyz</span>:<span class="path">~</span><span class="dollar"> $</span></span>';

// ── Project data ──
const PROJECTS = [
  {
    id: 'toy-totp', name: 'toy-totp', size: '4.2K', date: 'Mar 14 2026',
    title: 'toy totp',
    desc: `an interactive visualizer that breaks down the TOTP (time-based one-time password) algorithm step by step. watch how HMAC-SHA1 is computed, how dynamic truncation works, and how the final 6-digit code is derived — all with live animations.`,
    tags: ['javascript', 'cryptography', 'interactive'],
    links: [{ label: 'live demo', href: '/projects/toy-totp/' }],
  },
  {
    id: 'rust-ray-tracer', name: 'rust-ray-tracer', size: '8.1K', date: 'Aug  8 2023',
    title: 'rust ray tracer',
    desc: `a ray tracer written in rust following peter shirley's "ray tracing in one weekend" series. supports diffuse, metallic, and dielectric materials with configurable scenes. uses rayon for parallel rendering across all available cores.`,
    tags: ['rust', 'ray-tracing', 'computer-graphics'],
    links: [{ label: 'source', href: 'https://github.com/Ikerlb/ray-tracer-rust' }],
  },
  {
    id: 'mandelrust', name: 'mandelrust', size: '3.5K', date: 'May 10 2022',
    title: 'mandelrust',
    desc: `an interactive mandelbrot set explorer. click anywhere to zoom in. the rendering is done server-side via an AWS lambda function written in rust, with infrastructure managed by terraform. the client sends viewport coordinates and receives a PNG.`,
    tags: ['rust', 'aws-lambda', 'terraform', 'wasm'],
    links: [
      { label: 'live demo', href: '/mandelrust/' },
      { label: 'infra repo', href: 'https://github.com/Ikerlb/tf-mandelrust' },
    ],
  },
  {
    id: 'go-ray-tracer', name: 'go-ray-tracer', size: '6.7K', date: 'Feb 21 2022',
    title: 'go ray tracer',
    desc: `another implementation of "ray tracing in one weekend", this time in go. uses goroutines and channels for concurrent scanline rendering. implements diffuse, metal, and dielectric materials with depth-of-field.`,
    tags: ['go', 'ray-tracing', 'concurrency'],
    links: [{ label: 'source', href: 'https://github.com/Ikerlb/ray-tracer-go' }],
  },
  {
    id: 'advent-of-code-2021', name: 'advent-of-code-2021', size: '12K', date: 'Dec  1 2021',
    title: 'advent of code 2021',
    desc: `solutions and detailed write-ups for 12 days of advent of code 2021. each post walks through the problem, the approach, and the python implementation with complexity analysis.`,
    tags: ['python', 'algorithms', 'puzzles'],
    links: [{ label: 'write-ups', href: '/projects/advent-of-code-2021/' }],
  },
];

// ── Tab switching ──
const tabs = document.querySelectorAll('.tab');
const titleText = document.getElementById('title-text');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    switchTab(target);
  });
});

function switchTab(target) {
  tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === target));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + target).classList.add('active');

  const paths = { about: '~', projects: '~/projects', reading: '~/reading' };
  titleText.textContent = `iker@lissarrague.xyz: ${paths[target] || '~'}`;

  // Render pane content on first visit
  if (target === 'projects' && !projectsRendered) renderProjects();
  if (target === 'reading' && !readingRendered) renderReading();
}

// ── About pane (animated) ──
const aboutPane = document.getElementById('pane-about');
const skipHint = document.getElementById('skip-hint');

let animationRunning = true;
let skipRequested = false;
let currentTimeout = null;

function sleep(ms) {
  return new Promise(resolve => { currentTimeout = setTimeout(resolve, ms); });
}

function typeText(text, span) {
  return new Promise(async (resolve) => {
    const delay = Math.max(25, Math.min(55, 700 / text.length));
    for (let i = 0; i < text.length; i++) {
      if (skipRequested) { span.textContent = text; resolve(); return; }
      span.textContent = text.substring(0, i + 1);
      await sleep(delay);
    }
    resolve();
  });
}

async function addPromptAndType(container, cmdText) {
  const line = document.createElement('div');
  line.className = 'prompt-line';
  line.innerHTML = `${PROMPT} <span class="command"></span>`;
  container.appendChild(line);
  await typeText(cmdText, line.querySelector('.command'));
}

function addHTML(container, html) {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  while (wrapper.firstChild) container.appendChild(wrapper.firstChild);
}

const ABOUT_OUTPUT = `<div class="cat-output">
  <p><span class="highlight">iker lissarrague</span> — software engineer</p>
  <p>i'm a software engineer constantly looking for ways to make people's lives better with software.</p>
  <p>as of late, i've been focusing more and more on the backend of the stack but i've had some experience as a fullstack developer.</p>
  <p>i love trying out new technologies, specially programming languages that feel very novel from what i'm used to.</p>
  <p>feel free to reach out!</p>
  <p style="margin-top:12px;">
    <span class="dim">email:</span> <a href="mailto:iker@lissarrague.xyz">iker@lissarrague.xyz</a> &nbsp;
    <span class="dim">github:</span> <a href="https://github.com/Ikerlb/">Ikerlb</a> &nbsp;
    <span class="dim">linkedin:</span> <a href="https://www.linkedin.com/in/iker-lissarrague/">iker-lissarrague</a>
  </p>
</div>`;

async function runAboutIntro() {
  // MOTD
  addHTML(aboutPane, `<div class="output dim" style="margin-bottom:16px;">welcome to lissarrague.xyz\nlast login: Mon Mar 30 09:42:13 2026 from 192.168.1.1\ntype <span class="accent">help</span> or use the tabs above to navigate.</div>`);

  if (skipRequested) return;
  await sleep(400);

  // whoami
  if (skipRequested) return;
  await addPromptAndType(aboutPane, 'cat about.md');
  if (skipRequested) return;
  await sleep(300);
  addHTML(aboutPane, ABOUT_OUTPUT);

  animationRunning = false;
  skipHint.style.display = 'none';
}

function renderAboutFull() {
  aboutPane.innerHTML = '';
  addHTML(aboutPane, `<div class="output dim" style="margin-bottom:16px;">welcome to lissarrague.xyz\nlast login: Mon Mar 30 09:42:13 2026 from 192.168.1.1\ntype <span class="accent">help</span> or use the tabs above to navigate.</div>`);
  addHTML(aboutPane, `<div class="prompt-line">${PROMPT} <span class="command">cat about.md</span></div>`);
  addHTML(aboutPane, ABOUT_OUTPUT);
}

function skipAnimation() {
  if (!animationRunning) return;
  skipRequested = true;
  if (currentTimeout) clearTimeout(currentTimeout);
  animationRunning = false;
  skipHint.style.display = 'none';
  aboutPane.innerHTML = '';
  renderAboutFull();
}

document.addEventListener('click', (e) => {
  if (animationRunning && !e.target.closest('a') && !e.target.closest('.tab')) skipAnimation();
});
document.addEventListener('keydown', (e) => {
  if (animationRunning) { skipAnimation(); e.preventDefault(); }
});

// ── Projects pane ──
let projectsRendered = false;
const projectsPane = document.getElementById('pane-projects');

function renderProjects() {
  projectsRendered = true;
  showProjectList();
}

function appendProjectListing(container) {
  const listing = document.createElement('div');
  listing.className = 'output';
  let rows = '<div class="file-listing">';
  PROJECTS.forEach(p => {
    rows += `<div class="row" data-project="${p.id}">
      <span class="perms">drwxr-xr-x</span>
      <span class="owner">iker</span>
      <span class="size">${p.size}</span>
      <span class="date">${p.date}</span>
      <span class="name dir">${p.name}</span>
    </div>`;
  });
  rows += '</div>';
  listing.innerHTML = rows;
  container.appendChild(listing);

  listing.querySelectorAll('.row').forEach(row => {
    row.addEventListener('click', () => showProjectDetail(row.dataset.project));
  });
}

function showProjectList() {
  projectsPane.innerHTML = '';

  // cat projects intro
  addHTML(projectsPane, `<div class="prompt-line">${PROMPT} <span class="command">cat ~/projects/README.md</span></div>`);
  addHTML(projectsPane, `<div class="cat-output" style="margin-bottom:24px;">
    <p>these are some of the projects i work on in my spare time.</p>
    <p>most of them come from wanting to learn something new — a language, a rendering technique, a cloud service — and building something tangible with it.</p>
  </div>`);

  // ls projects
  addHTML(projectsPane, `<div class="prompt-line">${PROMPT} <span class="command">ls -la ~/projects/</span></div>`);
  appendProjectListing(projectsPane);
  addHTML(projectsPane, `<div class="dim" style="font-size:13px;margin-top:8px;">click a project to view details</div>`);

  titleText.textContent = 'iker@lissarrague.xyz: ~/projects';
}

function showProjectDetail(id) {
  const project = PROJECTS.find(p => p.id === id);
  if (!project) return;

  projectsPane.innerHTML = '';

  // cat README.md
  let linksHTML = '';
  if (project.links) {
    linksHTML = '<div class="project-links">' +
      project.links.map(l => `<a href="${l.href}">${l.label}</a>`).join('') +
      '</div>';
  }

  addHTML(projectsPane, `
    <div class="prompt-line">${PROMPT} <span class="command">cat ~/projects/${project.name}/README.md</span></div>
    <div style="margin-top:12px; margin-bottom:24px; padding: 0 0 0 2ch; border-left: 2px solid var(--bg-highlight);">
      <div class="project-title">${project.title}</div>
      <div class="project-meta">${project.date} · ${project.size}</div>
      <div class="project-body"><p>${project.desc}</p></div>
      <div class="tags">${project.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      ${linksHTML}
    </div>
  `);

  // ls projects again below
  addHTML(projectsPane, `<div class="prompt-line">${PROMPT} <span class="command">ls -la ~/projects/</span></div>`);
  appendProjectListing(projectsPane);

  titleText.textContent = `iker@lissarrague.xyz: ~/projects/${project.name}`;
  projectsPane.scrollTop = 0;
  document.querySelector('.pane-container').scrollTop = 0;
}

// ── Reading pane ──
let readingRendered = false;
const readingPane = document.getElementById('pane-reading');

function renderReading() {
  readingRendered = true;
  readingPane.innerHTML = '';
  addHTML(readingPane, `<div class="prompt-line">${PROMPT} <span class="command">cat reading_log.txt</span></div>`);

  const books = {
    '2022': [
      { title: 'Programming Rust, 2nd Ed.', author: 'Blandy, Orendorff, Tindall' },
      { title: 'Designing Data-Intensive Applications', author: 'Martin Kleppmann' },
      { title: 'Terraform: Up & Running, 3rd Ed.', author: 'Yevgeniy Brikman' },
    ],
    '2021': [
      { title: 'The Go Programming Language', author: 'Donovan, Kernighan' },
      { title: 'Grokking Algorithms', author: 'Aditya Bhargava' },
    ],
  };

  let html = '<div class="output">';
  for (const [year, entries] of Object.entries(books)) {
    html += `<div class="section-header">── ${year} ──</div><div class="reading-table">`;
    entries.forEach(b => {
      html += `<div class="entry">
        <span class="status done">✓</span>
        <span class="book-title">${b.title}</span>
        <span class="book-author dim">${b.author}</span>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  addHTML(readingPane, html);
}

// ── Start ──
runAboutIntro();
</script>
</body>
</html>
